

<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}seller{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap (optional) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            display: flex;
            font-family: Arial, sans-serif;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            background-color: #343a40;
            color: #fff;
            position: fixed;
        }

        .sidebar h4 {
            padding: 15px;
            margin: 0;
            background: #23272b;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: #ccc;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #495057;
            color: #fff;
        }

        /* Main content */
        .main {
            margin-left: 240px;
            width: 100%;
        }

        /* Navbar */
        .navbar-custom {
            background-color: #f8f9fa;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
        }

        .content {
            padding: 20px;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h4>My App</h4>

        <a href="#">➕ Product Add</a>
            <a href="{% url 'product_view' %}">📋 Product View</a>
<!--        <a href="#">➕ Add Ia>-->
<!--        <a href="#">⚙️ Settings</a>tem</-->
    </div>

    <!-- Main Area -->
    <div class="main">

        <!-- Navbar -->
        <div class="navbar-custom d-flex justify-content-between align-items-center">
            <div>
                <strong>{% block page_title %}Dashboard{% endblock %}</strong>
            </div>

            <div>
                {% if request.user.is_authenticated %}
                    <span class="me-3">👤 {{ request.user }}</span>
                    <a href="{% url 'logoutview' %}" class="btn btn-sm btn-outline-danger">Logout</a>
                {% else %}
                    <a href="#" class="btn btn-sm btn-outline-primary">Login</a>
                {% endif %}
            </div>
        </div>

        <!-- Page Content -->
        <div class="content">
          {% block content %}



          <!-- Child templates inject content here -->








           {% endblock %}
        </div>

    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
